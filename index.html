<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Book Library</title>
</head>
<body>
    <header class="header">
        <div class="wrapper">
            <h1 class="logo">📚 Book Library</h1>
            <p class="tagline">Top books like Atomic Habits & Rich Dad Poor Dad — powered by Open Library API</p>
        </div>
    </header>

    <main class="wrapper">
        <section class="search-bar">
            <input type="text" id="searchInput" placeholder="Search by book title or author name...">
            <button id="searchBtn" type="button">Search</button>
            <button id="topBooksBtn" type="button" class="btn-outline">Top Books</button>
        </section>

        <h2 id="sectionTitle" class="section-title">Top Books</h2>
        <div id="bookGrid" class="book-grid">
            <p class="loading">Loading books...</p>
        </div>
    </main>

    <footer class="footer">
        <p>Book Library — JavaScript Fetch API Project</p>
        <p>My Favorites Books , Which I Readed Or will Read, I Love Reading Books...</p>
    </footer>

    <script src="books.js"></script>
</body>
</html>
